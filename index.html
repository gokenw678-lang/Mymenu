<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>我的菜谱</title>

<style>

/* ===== 颜色（莫兰迪） ===== */
:root{
--main:#6c7a89;
--accent:#b7a99a;
--line:#e8e8e8;
--bg:#fafafa;
}

/* ===== 基础 ===== */

body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont;
background:var(--bg);
color:#333;
}

header{
padding:16px;
text-align:center;
font-size:20px;
border-bottom:1px solid var(--line);
letter-spacing:2px;
}

/* ===== 页面 ===== */

.page{
display:none;
padding:18px;
padding-bottom:90px;
}

.page.active{
display:block;
}

/* ===== 卡片 ===== */

.card{
border:1px solid var(--line);
border-radius:14px;
padding:14px;
margin-bottom:16px;
background:white;
}

.card img{
width:100%;
border-radius:10px;
margin-bottom:8px;
}

/* ===== 标签 ===== */

.tag{
display:inline-block;
border:1px solid var(--accent);
border-radius:14px;
padding:4px 10px;
margin:3px;
font-size:12px;
color:var(--accent);
}

/* ===== 输入框统一 ===== */

input,
textarea,
select,
.file-btn{

width:100%;
height:44px;
box-sizing:border-box;

padding:10px;
margin:6px 0;

border:1px solid var(--line);
border-radius:10px;

background:white;
font-size:14px;

}

textarea{
height:90px;
resize:none;
}

/* ===== 上传按钮 ===== */

.file-btn{
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
}

/* 隐藏默认 file input */
input[type=file]{
display:none;
}

/* ===== 按钮 ===== */

button{
border:1px solid var(--main);
background:white;
padding:8px 16px;
border-radius:20px;
color:var(--main);
margin-top:6px;
}

/* ===== 底部导航 ===== */

nav{
position:fixed;
bottom:0;
width:100%;
height:60px;
border-top:1px solid var(--line);
background:white;
display:flex;
}

nav button{
flex:1;
border:none;
border-right:1px solid var(--line);
border-radius:0;
}

nav button:last-child{
border-right:none;
}

</style>
</head>

<body>

<header>我的菜谱</header>

<!-- 首页 -->
<div id="home" class="page active">
<h3>今日推荐</h3>
<div id="homeList"></div>
</div>

<!-- 全部菜谱 -->
<div id="all" class="page">

<select id="tasteFilter">
<option value="">请选择口味</option>
<option>咸香</option>
<option>酸甜</option>
<option>香辣</option>
<option>清炒</option>
</select>

<select id="methodFilter">
<option value="">请选择做法</option>
<option>炒</option>
<option>炖</option>
<option>炸</option>
<option>焖</option>
</select>

<button onclick="filterRecipes()">筛选</button>

<div id="recipeList"></div>

</div>

<!-- 冰箱推荐 -->
<div id="fridge" class="page">

<input id="fridgeInput" placeholder="输入食材，例如：鸡蛋 土豆">

<button onclick="fridgeRecommend()">推荐</button>

<div id="fridgeList"></div>

</div>

<!-- 新增菜谱 -->
<div id="add" class="page">

<input id="name" placeholder="菜名">

<input id="ingredients" placeholder="食材（空格分开）">

<textarea id="steps" placeholder="做法"></textarea>

<!-- 上传图片 -->
<label class="file-btn">
上传图片
<input type="file" id="image">
</label>

<!-- 口味选择 -->
<select id="tasteSelect">
<option value="">请选择口味</option>
<option>咸香</option>
<option>酸甜</option>
<option>香辣</option>
<option>清炒</option>
</select>

<button onclick="addTaste()">添加口味</button>

<div id="tasteTags"></div>

<!-- 做法选择 -->

<select id="methodSelect">
<option value="">请选择做法</option>
<option>炒</option>
<option>炖</option>
<option>炸</option>
<option>焖</option>
</select>

<button onclick="addMethod()">添加做法</button>

<div id="methodTags"></div>

<button onclick="saveRecipe()">保存</button>

</div>

<!-- 详情 -->
<div id="detail" class="page">
<div id="detailContent"></div>
<button onclick="deleteRecipe()">删除</button>
</div>

<!-- 底部导航 -->
<nav>
<button onclick="show('home')">首页</button>
<button onclick="show('all')">菜谱</button>
<button onclick="show('fridge')">冰箱</button>
<button onclick="show('add')">新增</button>
</nav>

<script>

/* ===== 数据 ===== */

let recipes = JSON.parse(localStorage.getItem("recipes") || "[]")

let currentIndex = null

let tasteList=[]
let methodList=[]

function saveData(){
localStorage.setItem("recipes",JSON.stringify(recipes))
}

/* ===== 页面切换 ===== */

function show(id){

document.querySelectorAll(".page")
.forEach(p=>p.classList.remove("active"))

document.getElementById(id).classList.add("active")

if(id==="all") renderRecipes()
if(id==="home") renderHome()

}

/* ===== 首页推荐 ===== */

function renderHome(){

let box=document.getElementById("homeList")
box.innerHTML=""

if(recipes.length===0){
box.innerHTML="还没有菜谱"
return
}

let shuffled=[...recipes].sort(()=>0.5-Math.random())

shuffled.slice(0,2).forEach(r=>{
box.innerHTML+=card(r,recipes.indexOf(r))
})

}

/* ===== 菜谱卡片 ===== */

function card(r,i){

return `
<div class="card" onclick="openDetail(${i})">

${r.image?`<img src="${r.image}">`:""}

<h3>${r.name}</h3>

<div>
${r.taste.map(t=>`<span class="tag">${t}</span>`).join("")}
${r.method.map(m=>`<span class="tag">${m}</span>`).join("")}
</div>

</div>
`

}

/* ===== 渲染菜谱 ===== */

function renderRecipes(list=recipes){

let box=document.getElementById("recipeList")
box.innerHTML=""

list.forEach((r,i)=>{
box.innerHTML+=card(r,i)
})

}

/* ===== 筛选 ===== */

function filterRecipes(){

let taste=document.getElementById("tasteFilter").value
let method=document.getElementById("methodFilter").value

let list=recipes.filter(r=>{

let tOk=!taste||r.taste.includes(taste)
let mOk=!method||r.method.includes(method)

return tOk && mOk

})

renderRecipes(list)

}

/* ===== 添加口味标签 ===== */

function addTaste(){

let v=document.getElementById("tasteSelect").value

if(!v||tasteList.includes(v))return

tasteList.push(v)

renderTags()

}

/* ===== 添加做法标签 ===== */

function addMethod(){

let v=document.getElementById("methodSelect").value

if(!v||methodList.includes(v))return

methodList.push(v)

renderTags()

}

/* ===== 渲染标签 ===== */

function renderTags(){

document.getElementById("tasteTags").innerHTML=
tasteList.map(t=>`<span class="tag">${t}</span>`).join("")

document.getElementById("methodTags").innerHTML=
methodList.map(m=>`<span class="tag">${m}</span>`).join("")

}

/* ===== 保存菜谱 ===== */

function saveRecipe(){

let name=document.getElementById("name").value
let ingredients=document.getElementById("ingredients").value.split(" ")
let steps=document.getElementById("steps").value

let file=document.getElementById("image").files[0]

if(!name)return alert("请输入菜名")

function finish(img){

recipes.push({
name,
ingredients,
steps,
taste:[...tasteList],
method:[...methodList],
image:img
})

saveData()

alert("保存成功")

}

if(file){

let reader=new FileReader()

reader.onload=function(){
finish(reader.result)
}

reader.readAsDataURL(file)

}else{
finish(null)
}

}

/* ===== 冰箱推荐 ===== */

function fridgeRecommend(){

let input=document.getElementById("fridgeInput").value.split(" ")

let box=document.getElementById("fridgeList")
box.innerHTML=""

let list=recipes.filter(r=>
r.ingredients.some(i=>input.includes(i))
)

if(!list.length){
box.innerHTML="没有匹配菜谱"
return
}

list.forEach(r=>{
box.innerHTML+=card(r,recipes.indexOf(r))
})

}

/* ===== 详情 ===== */

function openDetail(i){

currentIndex=i
let r=recipes[i]

show("detail")

document.getElementById("detailContent").innerHTML=`

<h2>${r.name}</h2>

${r.image?`<img src="${r.image}" style="width:100%">`:""}

<p><b>食材</b> ${r.ingredients.join(" ")}</p>

<p><b>做法</b><br>${r.steps}</p>

`

}

/* ===== 删除 ===== */

function deleteRecipe(){

if(currentIndex===null)return

recipes.splice(currentIndex,1)

saveData()

show("all")

renderRecipes()

}

/* ===== 初始化 ===== */

renderHome()

</script>

</body>
</html>
