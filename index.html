<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>我的菜谱</title>

<style>

/* ===== 莫兰迪配色 ===== */

:root{
--main:#6b7c85;
--accent:#a89f91;
--line:#e3e3e3;
--bg:#fafafa;
}

body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont;
background:var(--bg);
color:#333;
}

/* ===== Header ===== */

header{
padding:16px;
text-align:center;
font-size:20px;
letter-spacing:2px;
border-bottom:1px solid var(--line);
}

/* ===== 页面 ===== */

.page{
display:none;
padding:16px;
padding-bottom:90px;
}

.page.active{
display:block;
}

/* ===== 卡片 ===== */

.card{
border:1px solid var(--line);
border-radius:14px;
padding:12px;
margin-bottom:14px;
background:white;
}

.card img{
width:100%;
border-radius:10px;
}

/* ===== 按钮 ===== */

button{
border:1px solid var(--main);
background:white;
padding:8px 14px;
border-radius:20px;
color:var(--main);
margin:4px;
}

button.primary{
background:var(--main);
color:white;
}

/* ===== 标签 ===== */

.tag{
border:1px solid var(--accent);
border-radius:14px;
padding:4px 10px;
margin:3px;
display:inline-block;
font-size:12px;
color:var(--accent);
}

/* ===== 筛选 ===== */

.filter{
margin-bottom:16px;
}

.filter label{
margin-right:10px;
}

/* ===== 底部导航 ===== */

nav{
position:fixed;
bottom:0;
width:100%;
height:60px;
border-top:1px solid var(--line);
background:white;
display:flex;
}

nav button{
flex:1;
border:none;
border-right:1px solid var(--line);
border-radius:0;
}

nav button:last-child{
border-right:none;
}

/* ===== 输入 ===== */

input,textarea{
width:100%;
margin:6px 0;
padding:10px;
border:1px solid var(--line);
border-radius:8px;
}

</style>
</head>


<body>

<header>我的菜谱</header>


<!-- 首页 -->
<div id="home" class="page active">
<h3>今日推荐</h3>
<div id="homeList"></div>
</div>


<!-- 全部菜谱 -->
<div id="all" class="page">

<div class="filter">

<b>口味</b><br>

<label><input type="checkbox" value="咸香" class="taste">咸香</label>
<label><input type="checkbox" value="酸甜" class="taste">酸甜</label>
<label><input type="checkbox" value="香辣" class="taste">香辣</label>
<label><input type="checkbox" value="清炒" class="taste">清炒</label>

<br><br>

<b>做法</b><br>

<label><input type="checkbox" value="炒" class="method">炒</label>
<label><input type="checkbox" value="炖" class="method">炖</label>
<label><input type="checkbox" value="炸" class="method">炸</label>
<label><input type="checkbox" value="焖" class="method">焖</label>

<br>

<button onclick="filterRecipes()">筛选</button>

</div>

<div id="recipeList"></div>

</div>


<!-- 冰箱推荐 -->

<div id="fridge" class="page">

<input id="fridgeInput" placeholder="输入食材，例如：鸡蛋 土豆">

<button onclick="fridgeRecommend()">推荐</button>

<div id="fridgeList"></div>

</div>


<!-- 新建菜谱 -->

<div id="add" class="page">

<input id="name" placeholder="菜名">

<input id="ingredients" placeholder="食材（空格分开）">

<textarea id="steps" placeholder="做法"></textarea>

<input type="file" id="image">

<br>

<b>口味</b><br>

<label><input type="checkbox" value="咸香" class="addTaste">咸香</label>
<label><input type="checkbox" value="酸甜" class="addTaste">酸甜</label>
<label><input type="checkbox" value="香辣" class="addTaste">香辣</label>
<label><input type="checkbox" value="清炒" class="addTaste">清炒</label>

<br><br>

<b>做法</b><br>

<label><input type="checkbox" value="炒" class="addMethod">炒</label>
<label><input type="checkbox" value="炖" class="addMethod">炖</label>
<label><input type="checkbox" value="炸" class="addMethod">炸</label>
<label><input type="checkbox" value="焖" class="addMethod">焖</label>

<br><br>

<button class="primary" onclick="saveRecipe()">保存</button>

</div>


<!-- 详情页 -->

<div id="detail" class="page">

<div id="detailContent"></div>

<button onclick="deleteRecipe()">删除</button>

</div>


<!-- 底部导航 -->

<nav>

<button onclick="show('home')">首页</button>
<button onclick="show('all')">菜谱</button>
<button onclick="show('fridge')">冰箱</button>
<button onclick="show('add')">新增</button>

</nav>



<script>

/* ===== 数据 ===== */

let recipes=JSON.parse(localStorage.getItem("recipes")||"[]")

let currentIndex=null


function saveData(){
localStorage.setItem("recipes",JSON.stringify(recipes))
}


/* ===== 页面切换 ===== */

function show(id){

document.querySelectorAll(".page")
.forEach(p=>p.classList.remove("active"))

document.getElementById(id).classList.add("active")

if(id==="all") renderRecipes()

if(id==="home") renderHome()

}


/* ===== 首页推荐 ===== */

function renderHome(){

let box=document.getElementById("homeList")

box.innerHTML=""

let shuffled=[...recipes].sort(()=>0.5-Math.random())

shuffled.slice(0,2).forEach((r,i)=>{

box.innerHTML+=card(r,i)

})

}


/* ===== 卡片 ===== */

function card(r,i){

return `

<div class="card" onclick="openDetail(${i})">

${r.image?`<img src="${r.image}">`:""}

<h3>${r.name}</h3>

<div>

${r.taste.map(t=>`<span class="tag">${t}</span>`).join("")}

${r.method.map(m=>`<span class="tag">${m}</span>`).join("")}

</div>

</div>

`

}


/* ===== 渲染菜谱 ===== */

function renderRecipes(list=recipes){

let box=document.getElementById("recipeList")

box.innerHTML=""

list.forEach((r,i)=>{

box.innerHTML+=card(r,i)

})

}


/* ===== 筛选 ===== */

function filterRecipes(){

let taste=[...document.querySelectorAll(".taste:checked")].map(x=>x.value)

let method=[...document.querySelectorAll(".method:checked")].map(x=>x.value)

let list=recipes.filter(r=>{

let tOk=!taste.length||taste.some(t=>r.taste.includes(t))

let mOk=!method.length||method.some(m=>r.method.includes(m))

return tOk && mOk

})

renderRecipes(list)

}


/* ===== 保存菜谱 ===== */

function saveRecipe(){

let name=document.getElementById("name").value

let ingredients=document.getElementById("ingredients").value.split(" ")

let steps=document.getElementById("steps").value

let taste=[...document.querySelectorAll(".addTaste:checked")].map(x=>x.value)

let method=[...document.querySelectorAll(".addMethod:checked")].map(x=>x.value)

let file=document.getElementById("image").files[0]

if(!name)return alert("请输入菜名")

if(file){

let reader=new FileReader()

reader.onload=function(){

recipes.push({
name,
ingredients,
steps,
taste,
method,
image:reader.result
})

saveData()

alert("已保存")

}

reader.readAsDataURL(file)

}else{

recipes.push({
name,
ingredients,
steps,
taste,
method,
image:null
})

saveData()

alert("已保存")

}

}


/* ===== 冰箱推荐 ===== */

function fridgeRecommend(){

let input=document.getElementById("fridgeInput").value.split(" ")

let box=document.getElementById("fridgeList")

box.innerHTML=""

let list=recipes.filter(r=>
r.ingredients.some(i=>input.includes(i))
)

if(!list.length){
box.innerHTML="没有匹配菜谱"
return
}

list.forEach((r,i)=>{

box.innerHTML+=card(r,i)

})

}


/* ===== 详情 ===== */

function openDetail(i){

currentIndex=i

let r=recipes[i]

show("detail")

document.getElementById("detailContent").innerHTML=`

<h2>${r.name}</h2>

${r.image?`<img src="${r.image}" style="width:100%">`:""}

<p><b>食材</b> ${r.ingredients.join(" ")}</p>

<p><b>做法</b><br>${r.steps}</p>

`

}


/* ===== 删除 ===== */

function deleteRecipe(){

if(currentIndex===null)return

recipes.splice(currentIndex,1)

saveData()

show("all")

renderRecipes()

}

renderHome()

</script>

</body>
</html>
