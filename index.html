<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>我的菜谱</title>

<style>

body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont;
background:#fff;
color:#222;
}

header{
padding:18px;
font-size:20px;
font-weight:600;
border-bottom:1px solid #eee;
text-align:center;
}

.container{
padding:16px;
padding-bottom:90px;
}

.card{
border:1px solid #eee;
border-radius:14px;
margin-bottom:18px;
overflow:hidden;
cursor:pointer;
}

.card img{
width:100%;
display:block;
}

.card-content{
padding:12px;
}

.card-title{
font-size:16px;
font-weight:600;
margin-bottom:6px;
}

.card-sub{
font-size:13px;
color:#777;
}

button{
border:1px solid #ddd;
background:white;
padding:10px 14px;
border-radius:8px;
margin-top:10px;
margin-right:8px;
}

input,select,textarea{
width:100%;
padding:10px;
margin-top:8px;
border:1px solid #ddd;
border-radius:8px;
}

.navbar{
position:fixed;
bottom:0;
left:0;
right:0;
height:60px;
border-top:1px solid #eee;
background:#fff;
display:flex;
justify-content:space-around;
align-items:center;
font-size:13px;
}

.nav-item{
text-align:center;
color:#555;
}

</style>
</head>

<body>

<header>我的菜谱</header>

<div class="container" id="content"></div>

<div class="navbar">

<div class="nav-item" onclick="showHome()">首页</div>
<div class="nav-item" onclick="showList()">菜谱</div>
<div class="nav-item" onclick="showAdd()">新增</div>
<div class="nav-item" onclick="showFridge()">冰箱</div>

</div>

<script>

let recipes = JSON.parse(localStorage.getItem("recipes")) || [];

function save(){
localStorage.setItem("recipes",JSON.stringify(recipes));
}

function randomRecipes(){
let shuffled=[...recipes].sort(()=>0.5-Math.random());
return shuffled.slice(0,2);
}

function cardHTML(r,i){
return `

<div class="card" onclick="showDetail(${i})">

${r.image?`<img src="${r.image}">`:""}

<div class="card-content">

<div class="card-title">${r.name}</div>

<div class="card-sub">${r.ingredients.join(", ")}</div>

</div>

</div>

`;
}

function showHome(){

let rec=randomRecipes();

let html="<h3>今日推荐</h3>";

rec.forEach(r=>{
html+=cardHTML(r,recipes.indexOf(r));
});

html+=`<button onclick="showHome()">换一批</button>`;

document.getElementById("content").innerHTML=html;

}

function showList(){

let html="";

recipes.forEach((r,i)=>{
html+=cardHTML(r,i);
});

document.getElementById("content").innerHTML=html;

}

function showDetail(i){

let r=recipes[i];

let html=`

<h2>${r.name}</h2>

${r.image?`<img style="width:100%;border-radius:12px;" src="${r.image}">`:""}

<p><b>食材</b><br>${r.ingredients.join(", ")}</p>

<p><b>口味</b><br>${r.taste}</p>

<p><b>荤素</b><br>${r.type}</p>

<p><b>做法</b><br>${r.steps}</p>

<button onclick="editRecipe(${i})">编辑</button>
<button onclick="deleteRecipe(${i})">删除</button>

`;

document.getElementById("content").innerHTML=html;

}

function deleteRecipe(i){

if(confirm("确定删除？")){

recipes.splice(i,1);

save();

showList();

}

}

function editRecipe(i){

let r=recipes[i];

document.getElementById("content").innerHTML=`

<h3>编辑菜谱</h3>

<input id="name" value="${r.name}">

<input type="file" id="image">

<input id="ingredients" value="${r.ingredients.join(" ")}">

<textarea id="steps">${r.steps}</textarea>

<select id="taste">
<option ${r.taste=="清淡"?"selected":""}>清淡</option>
<option ${r.taste=="香辣"?"selected":""}>香辣</option>
<option ${r.taste=="酸甜"?"selected":""}>酸甜</option>
<option ${r.taste=="麻辣"?"selected":""}>麻辣</option>
</select>

<select id="type">
<option ${r.type=="荤菜"?"selected":""}>荤菜</option>
<option ${r.type=="素菜"?"selected":""}>素菜</option>
</select>

<button onclick="updateRecipe(${i})">保存修改</button>

`;

}

function updateRecipe(i){

let file=document.getElementById("image").files[0];

if(file){

let reader=new FileReader();

reader.onload=function(e){

saveUpdate(i,e.target.result);

}

reader.readAsDataURL(file);

}else{

saveUpdate(i,recipes[i].image);

}

}

function saveUpdate(i,img){

recipes[i]={

name:document.getElementById("name").value,

image:img,

ingredients:document.getElementById("ingredients").value.split(" "),

steps:document.getElementById("steps").value,

taste:document.getElementById("taste").value,

type:document.getElementById("type").value

};

save();

showDetail(i);

}

function showAdd(){

document.getElementById("content").innerHTML=`

<h3>新增菜谱</h3>

<input id="name" placeholder="菜名">

<input type="file" id="image">

<input id="ingredients" placeholder="食材 空格分开">

<textarea id="steps" placeholder="做法"></textarea>

<select id="taste">
<option>清淡</option>
<option>香辣</option>
<option>酸甜</option>
<option>麻辣</option>
</select>

<select id="type">
<option>荤菜</option>
<option>素菜</option>
</select>

<button onclick="addRecipe()">保存</button>

`;

}

function addRecipe(){

let file=document.getElementById("image").files[0];

if(file){

let reader=new FileReader();

reader.onload=function(e){

saveNew(e.target.result);

}

reader.readAsDataURL(file);

}else{

saveNew("");

}

}

function saveNew(img){

let recipe={

name:document.getElementById("name").value,

image:img,

ingredients:document.getElementById("ingredients").value.split(" "),

steps:document.getElementById("steps").value,

taste:document.getElementById("taste").value,

type:document.getElementById("type").value

};

recipes.push(recipe);

save();

showList();

}

function showFridge(){

document.getElementById("content").innerHTML=`

<h3>冰箱推荐</h3>

<input id="foods" placeholder="输入食材 空格分开">

<button onclick="recommend()">推荐</button>

<div id="result"></div>

`;

}

function recommend(){

let foods=document.getElementById("foods").value.split(" ");

let html="";

recipes.forEach((r,i)=>{

let match=r.ingredients.filter(a=>foods.includes(a));

if(match.length>0){

html+=cardHTML(r,i);

}

});

document.getElementById("result").innerHTML=html || "没有匹配菜谱";

}

showHome();

</script>

</body>
</html>
