<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>我的菜谱</title>

<style>

/* ===== 莫兰迪配色 ===== */
:root{
--bg:#f7f6f3;
--card:#ffffff;
--primary:#8f9a8a;
--accent:#b7a9a1;
--text:#333;
--line:#e6e4df;
}

body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont;
background:var(--bg);
color:var(--text);
}

/* 顶部标题 */
header{
text-align:center;
padding:16px;
font-size:20px;
font-weight:600;
background:var(--card);
border-bottom:1px solid var(--line);
}

/* 内容区域 */
.container{
padding:16px;
padding-bottom:80px;
}

/* 卡片 */
.card{
background:var(--card);
border:1px solid var(--line);
border-radius:14px;
margin-bottom:16px;
overflow:hidden;
}

.card img{
width:100%;
display:block;
}

.card-body{
padding:12px;
}

.card-title{
font-size:16px;
font-weight:600;
}

.card-sub{
font-size:13px;
color:#777;
margin-top:4px;
}

/* 表单 */
input,select,textarea{
width:100%;
padding:10px;
margin-top:8px;
border:1px solid var(--line);
border-radius:8px;
background:white;
}

/* 按钮 */
button{
padding:10px 14px;
border-radius:8px;
border:1px solid var(--primary);
background:white;
color:var(--primary);
margin-top:10px;
}

/* 底部导航 */
.nav{
position:fixed;
bottom:0;
left:0;
right:0;
height:60px;
background:white;
border-top:1px solid var(--line);
display:flex;
justify-content:space-around;
align-items:center;
font-size:13px;
}

.nav div{
text-align:center;
color:#666;
}

.icon{
font-size:18px;
display:block;
}

</style>
</head>

<body>

<header>🍳 我的菜谱</header>

<div id="app" class="container"></div>

<!-- 底部导航 -->
<div class="nav">
<div onclick="home()"><span class="icon">🏠</span>首页</div>
<div onclick="list()"><span class="icon">📖</span>菜谱</div>
<div onclick="addPage()"><span class="icon">➕</span>新增</div>
<div onclick="fridgePage()"><span class="icon">🧊</span>冰箱</div>
</div>

<script>

/* ===== 数据 ===== */

let recipes = JSON.parse(localStorage.getItem("recipes")||"[]");

/* 保存数据 */
function save(){
localStorage.setItem("recipes",JSON.stringify(recipes));
}

/* ===== 首页 ===== */

function home(){

let html="<h3>今日推荐</h3>";

if(recipes.length===0){
html+="暂无菜谱";
}else{

let r=[...recipes].sort(()=>0.5-Math.random()).slice(0,2);

r.forEach(x=>{
html+=card(x,recipes.indexOf(x));
});

}

html+='<button onclick="home()">换一批</button>';

app.innerHTML=html;

}

/* ===== 卡片组件 ===== */

function card(r,i){

return `
<div class="card" onclick="detail(${i})">

${r.image?`<img src="${r.image}">`:""}

<div class="card-body">
<div class="card-title">${r.name}</div>
<div class="card-sub">${r.ingredients.join(" , ")}</div>
</div>

</div>
`;

}

/* ===== 菜谱列表 + 筛选 ===== */

function list(){

let html=`

<h3>菜谱筛选</h3>

<input id="searchFood" placeholder="按食材筛选">

<select id="searchTaste">
<option value="">口味</option>
<option>清淡</option>
<option>香辣</option>
<option>酸甜</option>
<option>麻辣</option>
</select>

<select id="searchType">
<option value="">荤素</option>
<option>荤菜</option>
<option>素菜</option>
</select>

<button onclick="filter()">筛选</button>

<div id="list"></div>

`;

app.innerHTML=html;

renderList(recipes);

}

/* 渲染列表 */

function renderList(arr){

let html="";

arr.forEach((r,i)=>{
html+=card(r,i);
});

document.getElementById("list").innerHTML=html||"没有菜谱";

}

/* 筛选 */

function filter(){

let food=document.getElementById("searchFood").value.trim();
let taste=document.getElementById("searchTaste").value;
let type=document.getElementById("searchType").value;

let result=recipes.filter(r=>{

let ok=true;

if(food){
ok=r.ingredients.includes(food);
}

if(taste){
ok=ok && r.taste===taste;
}

if(type){
ok=ok && r.type===type;
}

return ok;

});

renderList(result);

}

/* ===== 详情页 ===== */

function detail(i){

let r=recipes[i];

app.innerHTML=`

<h2>${r.name}</h2>

${r.image?`<img style="width:100%;border-radius:12px" src="${r.image}">`:""}

<p><b>食材</b><br>${r.ingredients.join(" , ")}</p>

<p><b>口味</b><br>${r.taste}</p>

<p><b>荤素</b><br>${r.type}</p>

<p><b>做法</b><br>${r.steps}</p>

<button onclick="editPage(${i})">编辑</button>
<button onclick="remove(${i})">删除</button>

`;

}

/* 删除 */

function remove(i){

if(confirm("删除这道菜？")){
recipes.splice(i,1);
save();
list();
}

}

/* ===== 新增 ===== */

function addPage(){

app.innerHTML=`

<h3>新增菜谱</h3>

<input id="name" placeholder="菜名">

<input type="file" id="img">

<input id="ingredients" placeholder="食材 用空格分开">

<textarea id="steps" placeholder="做法"></textarea>

<select id="taste">
<option>清淡</option>
<option>香辣</option>
<option>酸甜</option>
<option>麻辣</option>
</select>

<select id="type">
<option>荤菜</option>
<option>素菜</option>
</select>

<button onclick="add()">保存</button>

`;

}

/* 保存菜谱 */

function add(){

let file=document.getElementById("img").files[0];

if(file){

let reader=new FileReader();

reader.onload=e=>{
saveNew(e.target.result);
};

reader.readAsDataURL(file);

}else{

saveNew("");

}

}

function saveNew(img){

let recipe={

name:name.value,
image:img,
ingredients:ingredients.value.split(" "),
steps:steps.value,
taste:taste.value,
type:type.value

};

recipes.push(recipe);
save();
list();

}

/* ===== 编辑 ===== */

function editPage(i){

let r=recipes[i];

app.innerHTML=`

<h3>编辑菜谱</h3>

<input id="name" value="${r.name}">

<input id="ingredients" value="${r.ingredients.join(" ")}">

<textarea id="steps">${r.steps}</textarea>

<select id="taste">
<option ${r.taste==="清淡"?"selected":""}>清淡</option>
<option ${r.taste==="香辣"?"selected":""}>香辣</option>
<option ${r.taste==="酸甜"?"selected":""}>酸甜</option>
<option ${r.taste==="麻辣"?"selected":""}>麻辣</option>
</select>

<select id="type">
<option ${r.type==="荤菜"?"selected":""}>荤菜</option>
<option ${r.type==="素菜"?"selected":""}>素菜</option>
</select>

<button onclick="update(${i})">保存修改</button>

`;

}

/* 更新 */

function update(i){

recipes[i]={

name:name.value,
ingredients:ingredients.value.split(" "),
steps:steps.value,
taste:taste.value,
type:type.value,
image:recipes[i].image

};

save();
detail(i);

}

/* ===== 冰箱推荐 ===== */

function fridgePage(){

app.innerHTML=`

<h3>冰箱有什么</h3>

<input id="foods" placeholder="输入食材 用空格分开">

<button onclick="recommend()">推荐</button>

<div id="result"></div>

`;

}

function recommend(){

let foods=document.getElementById("foods").value.split(" ");

let result=recipes.filter(r=>{

return r.ingredients.some(i=>foods.includes(i));

});

let html="";

result.forEach((r,i)=>{
html+=card(r,i);
});

document.getElementById("result").innerHTML=html||"没有匹配菜谱";

}

/* 启动 */

home();

</script>

</body>
</html>
