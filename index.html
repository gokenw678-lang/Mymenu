<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>今天吃什么</title>

<style>

body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont;
background:#fff;
color:#222;
}

header{
padding:18px;
font-size:20px;
font-weight:600;
border-bottom:1px solid #eee;
text-align:center;
}

.container{
padding:16px;
padding-bottom:90px;
}

.card{
border:1px solid #eee;
border-radius:14px;
margin-bottom:18px;
overflow:hidden;
}

.card img{
width:100%;
display:block;
}

.card-content{
padding:12px;
}

.card-title{
font-size:16px;
font-weight:600;
margin-bottom:6px;
}

.card-sub{
font-size:13px;
color:#777;
}

button{
border:1px solid #ddd;
background:white;
padding:10px 14px;
border-radius:8px;
margin-top:10px;
}

input,select,textarea{
width:100%;
padding:10px;
margin-top:8px;
border:1px solid #ddd;
border-radius:8px;
}

.navbar{
position:fixed;
bottom:0;
left:0;
right:0;
height:60px;
border-top:1px solid #eee;
background:#fff;
display:flex;
justify-content:space-around;
align-items:center;
font-size:13px;
}

.nav-item{
text-align:center;
color:#555;
}

</style>
</head>

<body>

<header>今天吃什么</header>

<div class="container" id="content"></div>

<div class="navbar">

<div class="nav-item" onclick="showHome()">首页</div>
<div class="nav-item" onclick="showList()">菜谱</div>
<div class="nav-item" onclick="showAdd()">新增</div>
<div class="nav-item" onclick="showFridge()">冰箱</div>

</div>

<script>

let recipes = JSON.parse(localStorage.getItem("recipes")) || [];

function save(){
localStorage.setItem("recipes",JSON.stringify(recipes));
}

function randomRecipes(){

let shuffled=[...recipes].sort(()=>0.5-Math.random());
return shuffled.slice(0,2);

}

function showHome(){

let rec=randomRecipes();

let html="<h3>今日推荐</h3>";

rec.forEach(r=>{

html+=cardHTML(r);

});

html+=`<button onclick="showHome()">换一批</button>`;

document.getElementById("content").innerHTML=html;

}

function cardHTML(r){

return `

<div class="card">

${r.image?`<img src="${r.image}">`:""}

<div class="card-content">

<div class="card-title">${r.name}</div>

<div class="card-sub">

${r.ingredients.join(", ")}

</div>

</div>

</div>

`;

}

function showList(){

let html="";

recipes.forEach(r=>{

html+=cardHTML(r);

});

document.getElementById("content").innerHTML=html;

}

function showAdd(){

document.getElementById("content").innerHTML=`

<h3>新增菜谱</h3>

<input id="name" placeholder="菜名">

<input type="file" id="image" accept="image/*">

<input id="ingredients" placeholder="食材 空格分开">

<textarea id="steps" placeholder="做法"></textarea>

<select id="taste">
<option>清淡</option>
<option>香辣</option>
<option>酸甜</option>
<option>麻辣</option>
</select>

<select id="type">
<option>荤菜</option>
<option>素菜</option>
</select>

<button onclick="addRecipe()">保存</button>

`;

}

function addRecipe(){

let file=document.getElementById("image").files[0];

if(file){

let reader=new FileReader();

reader.onload=function(e){

saveRecipe(e.target.result);

}

reader.readAsDataURL(file);

}else{

saveRecipe("");

}

}

function saveRecipe(img){

let recipe={

name:document.getElementById("name").value,

image:img,

ingredients:document.getElementById("ingredients").value.split(" "),

steps:document.getElementById("steps").value,

taste:document.getElementById("taste").value,

type:document.getElementById("type").value

};

recipes.push(recipe);

save();

alert("保存成功");

showList();

}

function showFridge(){

document.getElementById("content").innerHTML=`

<h3>冰箱推荐</h3>

<input id="foods" placeholder="输入食材 空格分开">

<button onclick="recommend()">推荐</button>

<div id="result"></div>

`;

}

function recommend(){

let foods=document.getElementById("foods").value.split(" ");

let html="";

recipes.forEach(r=>{

let match=r.ingredients.filter(i=>foods.includes(i));

if(match.length>0){

html+=cardHTML(r);

}

});

document.getElementById("result").innerHTML=html || "没有匹配菜谱";

}

showHome();

</script>

</body>
</html>
